name: pytest

on:
  push:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: '3.8'
            mlflow: '2.0.1'
            pyspark: '3.0.3'
            java: '11'
          - python: '3.11'
            mlflow: '2.22.4'
            pyspark: '3.5.8'
            java: '11'
          - python: '3.13'
            mlflow: '2.22.4'
            pyspark: '4.0.2'
            java: '17'
          - python: '3.13'
            mlflow: '2.22.4'
            pyspark: '4.1.1'
            java: '17'

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: ${{ matrix.java }}
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
        cache: 'pip'
    - run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install mlflow==${{ matrix.mlflow }}
        pip install pyspark==${{ matrix.pyspark }}
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - run: |
        python -m pytest
